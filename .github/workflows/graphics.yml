name: Generate Profile Graphics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=#3fc39a&color_dots=#ece5f8,#cdb9f2,#a988e8,#8b6fd8,#5d4494
            dist/github-snake-dark.svg?color_snake=#7ce8c4&color_dots=#1d1526,#3a2a52,#614492,#8b6fd8,#b89aff

      - uses: yoshi389111/github-profile-3d-contrib@v0.9.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          SETTING_JSON: conf/3d-settings.json

      # The language pie uses GitHub's fixed linguist colors, remap them to the profile palette
      - name: Recolor language pie
        run: |
          sed -i \
            -e 's/#3178c6/#b89aff/gi' \
            -e 's/#41b883/#7ce8c4/gi' \
            -e 's/#f1e05a/#ffc474/gi' \
            -e 's/#4f5d95/#8b6fd8/gi' \
            -e 's/#c6538c/#ff6ba0/gi' \
            -e 's/#e34c26/#e0447e/gi' \
            -e 's/#563d7c/#f0e8dc/gi' \
            -e 's/#663399/#f0e8dc/gi' \
            -e 's/#444444/#e8983a/gi' \
            profile-3d-contrib/*.svg

      - name: Collect SVGs
        run: sudo cp profile-3d-contrib/*.svg dist/

      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
