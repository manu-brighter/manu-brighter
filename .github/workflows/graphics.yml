name: Generate Profile Graphics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=#3fc39a&color_dots=#fbe3ed,#ffb7d2,#ff87b4,#e0447e,#a82e5c
            dist/github-snake-dark.svg?color_snake=#7ce8c4&color_dots=#241318,#4d2033,#8a3157,#c44d7e,#ff6ba0

      - uses: yoshi389111/github-profile-3d-contrib@v0.9.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          SETTING_JSON: conf/3d-settings.json

      - name: Collect SVGs
        run: sudo cp profile-3d-contrib/*.svg dist/

      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
