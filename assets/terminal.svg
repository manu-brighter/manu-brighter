<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 250" width="760" height="250" role="img" aria-label="Animated terminal: whoami, Manuel Heller, Full Stack Developer, Switzerland">
  <style>
    text {
      font-family: 'Cascadia Code', ui-monospace, 'SF Mono', Menlo, Consolas, 'DejaVu Sans Mono', monospace;
      font-size: 14px;
    }
    .t { fill: #f0e8dc; }
    .p { fill: #ff6ba0; }
    .o { fill: #b9a99e; }
    .dir { fill: #7ce8c4; }
    .str { fill: #ffc474; }
    .ok { fill: #7ce8c4; }
    .title { fill: #b9a99e; font-size: 12px; }
    .curtain { fill: #120a0e; transform-box: fill-box; transform-origin: 100% 50%; }
    .cur { fill: #ff6ba0; animation: blink 1.12s steps(1, end) infinite; }
    #screen { animation: clear 16s linear infinite; }
    .l1 { animation: r1 16s linear infinite; }
    .c1 { animation: t1 16s linear infinite; }
    .l2 { animation: r2 16s linear infinite; }
    .l3 { animation: r3 16s linear infinite; }
    .c3 { animation: t3 16s linear infinite; }
    .l4 { animation: r4 16s linear infinite; }
    .l5 { animation: r5 16s linear infinite; }
    .c5 { animation: t5 16s linear infinite; }
    .l6 { animation: r6 16s linear infinite; }
    .l7 { animation: r7 16s linear infinite; }
    @keyframes clear { 0%, 96% { opacity: 1; } 97.5%, 100% { opacity: 0; } }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    @keyframes r1 { 0%, 1.99% { opacity: 0; } 2%, 100% { opacity: 1; } }
    @keyframes t1 { 0%, 2% { transform: scaleX(1); animation-timing-function: steps(8, end); } 7%, 100% { transform: scaleX(0); } }
    @keyframes r2 { 0%, 8.99% { opacity: 0; } 9%, 100% { opacity: 1; } }
    @keyframes r3 { 0%, 11.99% { opacity: 0; } 12%, 100% { opacity: 1; } }
    @keyframes t3 { 0%, 12% { transform: scaleX(1); animation-timing-function: steps(13, end); } 17%, 100% { transform: scaleX(0); } }
    @keyframes r4 { 0%, 19.49% { opacity: 0; } 19.5%, 100% { opacity: 1; } }
    @keyframes r5 { 0%, 22.99% { opacity: 0; } 23%, 100% { opacity: 1; } }
    @keyframes t5 { 0%, 23% { transform: scaleX(1); animation-timing-function: steps(39, end); } 33%, 100% { transform: scaleX(0); } }
    @keyframes r6 { 0%, 35.49% { opacity: 0; } 35.5%, 100% { opacity: 1; } }
    @keyframes r7 { 0%, 38.99% { opacity: 0; } 39%, 100% { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      #screen, #screen g, .cur { animation: none !important; }
      .curtain { display: none; }
    }
  </style>

  <clipPath id="win"><rect x="1.5" y="1.5" width="757" height="247" rx="12"/></clipPath>

  <rect x="1.5" y="1.5" width="757" height="247" rx="12" fill="#120a0e" stroke="#2a1a22" stroke-width="1.5"/>
  <g clip-path="url(#win)">
    <rect x="0" y="0" width="760" height="35" fill="#1a0e12"/>
    <line x1="0" y1="35.5" x2="760" y2="35.5" stroke="#2a1a22" stroke-width="1"/>
  </g>
  <circle cx="24" cy="17.5" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="17.5" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="17.5" r="6" fill="#27c93f"/>
  <text x="380" y="22" text-anchor="middle" class="title">manuel@brighter: ~</text>

  <g id="screen">
    <g class="l1">
      <text y="64"><tspan x="28" class="p" textLength="8.4" lengthAdjust="spacingAndGlyphs">$</tspan><tspan x="44.8" class="t" textLength="50.4" lengthAdjust="spacingAndGlyphs">whoami</tspan></text>
      <rect class="curtain c1" x="26" y="50" width="71" height="18"/>
    </g>
    <g class="l2">
      <text y="89"><tspan x="28" class="o" textLength="495.6" lengthAdjust="spacingAndGlyphs">Manuel Heller · Full Stack Developer @ zvoove · Switzerland</tspan></text>
    </g>
    <g class="l3">
      <text y="114"><tspan x="28" class="p" textLength="8.4" lengthAdjust="spacingAndGlyphs">$</tspan><tspan x="44.8" class="t" textLength="92.4" lengthAdjust="spacingAndGlyphs">ls ~/skills</tspan></text>
      <rect class="curtain c3" x="26" y="100" width="113" height="18"/>
    </g>
    <g class="l4">
      <text y="139" xml:space="preserve"><tspan x="28" class="dir" textLength="453.6" lengthAdjust="spacingAndGlyphs">php/  vue/  typescript/  mysql/  cypress/  vibecoding/</tspan></text>
    </g>
    <g class="l5">
      <text y="164"><tspan x="28" class="p" textLength="8.4" lengthAdjust="spacingAndGlyphs">$</tspan><tspan x="44.8" class="t" textLength="109.2" lengthAdjust="spacingAndGlyphs">git commit -m</tspan><tspan x="162.4" class="str" textLength="193.2" lengthAdjust="spacingAndGlyphs">"feat / life : ship it"</tspan></text>
      <rect class="curtain c5" x="26" y="150" width="331" height="18"/>
    </g>
    <g class="l6">
      <text y="189"><tspan x="28" class="ok" textLength="8.4" lengthAdjust="spacingAndGlyphs">✔</tspan><tspan x="44.8" class="o" textLength="310.8" lengthAdjust="spacingAndGlyphs">works on my machine, deploying anyway</tspan></text>
    </g>
    <g class="l7">
      <text y="214"><tspan x="28" class="p" textLength="8.4" lengthAdjust="spacingAndGlyphs">$</tspan></text>
      <rect class="cur" x="44.8" y="202" width="8.4" height="15"/>
    </g>
  </g>
</svg>
